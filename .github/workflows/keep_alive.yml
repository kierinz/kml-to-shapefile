name: Wake Up Streamlit App

on:
  schedule:
    - cron: '0 */10 * * *' # Berjalan setiap 10 jam
  workflow_dispatch: # Boleh dijalankan manual

jobs:
  wake_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # v5 membuang terus amaran Node.js 20

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Menggunakan runtime stabil untuk Playwright

      - name: Install Playwright and Browsers
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps # PENTING: Memasang pelayar web Chromium ke dalam Ubuntu

      - name: Run Browser Script to Click Wake Button
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            
            console.log('Membuka aplikasi Streamlit...');
            await page.goto('https://streamlit.app', { waitUntil: 'networkidle' });
            
            // Mencari butang biru berdasarkan teks pada gambar
            const wakeButton = page.locator('button:has-text(\"Yes, get this app back up!\")');
            
            if (await wakeButton.count() > 0) {
              console.log('Butang tidur dikesan! Menekan butang untuk membangunkan aplikasi...');
              await wakeButton.click();
              await page.waitForTimeout(5000); // Tunggu 5 saat untuk proses memuatkan semula
              console.log('Aplikasi berjaya dikejutkan!');
            } else {
              console.log('Aplikasi sudah sedia aktif, tiada butang tidur dikesan.');
            }
            
            await browser.close();
          })();
          "
