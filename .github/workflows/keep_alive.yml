name: Wake Up Streamlit App

on:
  schedule:
    - cron: '0 */10 * * *' # Berjalan setiap 10 jam
  workflow_dispatch: # Boleh dijalankan manual

jobs:
  wake_app:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and Dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Deep Browser Click Script
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            
            console.log('Membuka aplikasi Streamlit...');
            await page.goto('https://kml2shp.streamlit.app/', { waitUntil: 'networkidle', timeout: 60000 });
            
            // 1. Tunggu sebentar untuk pastikan semua iframe dimuatkan
            await page.waitForTimeout(5000);
            
            // 2. Cari butang di halaman utama ATAU di dalam mana-mana iframe (Streamlit menggunakan iframe untuk bungkusan cloud)
            let wakeButton = page.locator('button:has-text(\"Yes, get this app back up!\")');
            let clicked = false;

            if (await wakeButton.count() > 0) {
              console.log('Butang dikesan di halaman utama! Menekan...');
              await wakeButton.click();
              clicked = true;
            } else {
              // Jika tiada di halaman utama, selongkar semua iframe yang ada
              const frames = page.frames();
              console.log('Mencari butang di dalam ' + frames.length + ' iframe...');
              for (const frame of frames) {
                const buttonInFrame = frame.locator('button:has-text(\"Yes, get this app back up!\")');
                if (await buttonInFrame.count() > 0) {
                  console.log('Butang ditemui di dalam iframe! Menekan butang untuk mengejutkan aplikasi...');
                  await buttonInFrame.click();
                  clicked = true;
                  break;
                }
              }
            }
            
            if (clicked) {
              console.log('Sila tunggu 15 saat untuk proses pengaktifan server pelayan...');
              await page.waitForTimeout(15000); 
              console.log('Proses selesai! Sila semak aplikasi anda.');
            } else {
              console.log('Aplikasi sudah sedia bangun atau struktur halaman berubah.');
            }
            
            await browser.close();
          })();
          "
