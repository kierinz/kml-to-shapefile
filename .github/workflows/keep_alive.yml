name: Wake Up Streamlit App

on:
  schedule:
    - cron: '0 */10 * * *' # Berjalan setiap 10 jam
  workflow_dispatch: # Boleh dijalankan manual

jobs:
  wake_app:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and Dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Browser Script to Click Wake Button
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            
            console.log('Membuka aplikasi Streamlit...');
            await page.goto('https://streamlit.app', { waitUntil: 'networkidle' });
            
            // Mencari butang biru berdasarkan teks di dalam gambar
            const wakeButton = page.locator('button:has-text(\"Yes, get this app back up!\")');
            
            if (await wakeButton.count() > 0) {
              console.log('Butang tidur dikesan! Menekan butang untuk membangunkan aplikasi...');
              await wakeButton.click();
              await page.waitForTimeout(8000); // Tunggu 8 saat untuk proses memuatkan semula
              console.log('Aplikasi berjaya dikejutkan!');
            } else {
              console.log('Aplikasi sudah sedia aktif atau butang tidak ditemui.');
            }
            
            await browser.close();
          })();
          "
